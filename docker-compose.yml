name: telemetry-pipeline

services:
  # ── Redpanda ───────────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --schema-registry-addr 0.0.0.0:8081
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-net

  # ── Redpanda Console (web UI) ──────────────────────────────────────────────
  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - telemetry-net

  # ── TimescaleDB ────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./docker/timescaledb-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry-net

  # ── Topic initialisation (runs once, exits) ────────────────────────────────
  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        rpk topic create telemetry.cooling-units --brokers redpanda:9092 || true;
        rpk topic create telemetry.pump-motors   --brokers redpanda:9092 || true;
        rpk topic create telemetry.failures      --brokers redpanda:9092 || true;
        echo 'Topics initialization complete'
      "
    networks:
      - telemetry-net

  # ── Simulator ─────────────────────────────────────────────────────────────
  simulator:
    build:
      context: ./python_services/telemetry_device_sim
      dockerfile: Dockerfile
    container_name: simulator
    env_file: .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
    networks:
      - telemetry-net
    restart: on-failure

  # ── Consumer ──────────────────────────────────────────────────────────────
  consumer:
    build:
      context: ./python_services
      dockerfile: Dockerfile
    container_name: consumer
    env_file: .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      POSTGRES_HOST: timescaledb
    depends_on:
      redpanda-init:
        condition: service_completed_successfully
      timescaledb:
        condition: service_healthy
    networks:
      - telemetry-net
    restart: on-failure

  # ── Streamlit Dashboard ────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./python_services/streamlit_dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    env_file: .env
    environment:
      POSTGRES_HOST: timescaledb
    ports:
      - "8501:8501"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - telemetry-net
    restart: on-failure

volumes:
  timescaledb-data:

networks:
  telemetry-net:
    driver: bridge
